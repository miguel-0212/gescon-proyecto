name: CI/CD Pipeline gescon_mgb

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/gescon_mgb

jobs:

  # ── 01 · BUILD ──────────────────────────────────────────────────────────────
  build:
    name: "01 · Build — instalar dependencias"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias (npm ci)
        run: npm ci

      - name: Guardar node_modules como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: node_modules
          path: node_modules/
          retention-days: 1

  # ── 02 · TEST ───────────────────────────────────────────────────────────────
  test:
    name: "02 · Test — Jest (pruebas unitarias)"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restaurar node_modules
        uses: actions/download-artifact@v4
        with:
          name: node_modules
          path: node_modules/

      - name: Ejecutar tests unitarios con cobertura
        run: npm test

      - name: Publicar resultados de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── 03 · DOCKER BUILD ───────────────────────────────────────────────────────
  docker-build:
    name: "03 · Docker Build — construir imagen"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push:    false
          tags:    ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 04 · DOCKER PUSH ────────────────────────────────────────────────────────
  docker-push:
    name: "04 · Docker Push — publicar en Docker Hub"
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y Push imagen (latest + sha)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 05 · DEPLOY ─────────────────────────────────────────────────────────────
  deploy:
    name: "05 · Deploy — EC2 PRE/Staging (AWS)"
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout código fuente
        uses: actions/checkout@v4

      - name: Desplegar en instancia EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Ir al directorio de la aplicación en EC2
            cd ~/gescon-proyecto

            # Actualizar docker-compose.yml con la nueva imagen
            export DOCKER_IMAGE=${{ env.IMAGE_NAME }}:${{ github.sha }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            # Pull de la nueva imagen y redespliegue sin downtime
            docker compose pull app
            docker compose up -d --remove-orphans

            # Verificar que los contenedores están corriendo
            docker compose ps

            echo "✅ Despliegue completado: $DOCKER_IMAGE"
